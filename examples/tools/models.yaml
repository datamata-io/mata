# ============================================================================
# Configuration Tips
# ============================================================================
# 1. Use absolute paths for local model files
# 2. Use forward slashes (/) even on Windows
# 3. Set device to "auto" for automatic GPU/CPU selection
# 4. Adjust thresholds based on your use case:
#    - Detection: Higher threshold (0.5-0.7) = fewer false positives
#    - Classification: top_k controls number of predictions returned
# 5. Project-local configs (.mata/models.yaml) override user-global (~/.mata/models.yaml)
# 6. You can add custom parameters specific to your models

# ============================================================================
# Usage Examples
# ============================================================================
# # Load using alias
# detector = mata.load("detect", "rtdetr-r50")
# classifier = mata.load("classify", "resnet-50")
#
# # Register at runtime
# mata.register_model("detect", "my-model", "/path/to/model.onnx", threshold=0.6)
# mata.register_model("classify", "custom-clf", "org/model-id", top_k=10)
#
# # Load registered model
# detector = mata.load("detect", "my-model")
# classifier = mata.load("classify", "custom-clf")
