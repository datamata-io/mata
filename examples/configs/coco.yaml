# COCO 2017 validation dataset configuration for mata.val()
#
# Dataset structure expected:
#   data/coco/
#   ├── val2017/                                            ← images
#   └── annotations_trainval2017/
#       └── annotations/
#           └── instances_val2017.json                      ← COCO JSON
#
# Download: https://cocodataset.org/#download
#   - 2017 Val images  (1 GB)
#   - 2017 Train/Val annotations (241 MB)

path: /home/mtp/code/MATA/data/coco          # dataset root (absolute path)
val: val2017                                  # images subdirectory for validation
annotations: annotations_trainval2017/annotations/instances_val2017.json

# COCO 80-class names (0-indexed)
names:
