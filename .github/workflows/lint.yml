name: Lint
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (for pycocotools)
        run: sudo apt-get install -y gcc

      - run: pip install -e ".[dev]"

      - name: Black check
        run: black --check src/ tests/

      - name: Ruff check
        run: ruff check src/

      - name: Mypy check
        run: mypy src/mata/ --ignore-missing-imports
